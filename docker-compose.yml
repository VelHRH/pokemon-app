version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: pokemon-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://pokemon-user:pokemon-password@mongodb:27017/pokemon-db?authSource=pokemon-db
      - SEED_POKEAPI=true
      - SEED_LIMIT=all
    volumes:
      # Mount source code for hot-reload
      - ./server/src:/app/server/src
      - ./server/package.json:/app/server/package.json:ro
      - ./server/package-lock.json:/app/server/package-lock.json:ro
      - ./shared:/app/server/shared:ro
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - pokemon-network
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: pokemon-client
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      # Browser hits Vite on :5173; dev server proxies /api → Nest (use service name on Docker network)
      - VITE_DEV_PROXY_TARGET=http://app:3000
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared:ro
      - client_node_modules:/app/client/node_modules
    networks:
      - pokemon-network
    depends_on:
      - app
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: pokemon-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=pokemon-db
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - pokemon-network
    restart: no

networks:
  pokemon-network:
    driver: bridge

volumes:
  mongodb_data:
  client_node_modules:
